# GitHub Actions - GitHub Pages デプロイワークフロー
# web/ (Vite + Kotlin/Wasm) のビルドとデプロイ。
# 旧 trianglelist-web (Rust + Trunk) 版を置き換え (2026-06-11、web 段階2)。
#
# リリース手順 (user 操作):
#   GitHub → Actions → "Deploy web to GitHub Pages" → Run workflow → branch を選んで実行
#   (デプロイは意図的に手動起動のみ。push では公開されない)

name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制御: 進行中のデプロイをキャンセルして最新を優先
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Kotlin/Wasm 出力 (compileSync optimized + dist productionExecutable) を
      # source hash key で cache。 同一 source の再 deploy で wasm build (~124s) を 0s に
      # 短絡する (2026-06-18 user 指示 「Actions の状況分析してビルド最適化しろ」)。
      # key の hash 対象: common/src の Kotlin source + build script + バージョンファイル。
      # source が変わった時のみ次の Build step が gradle を起動、 そのときも --build-cache で
      # task 単位の skip を効かせる。
      # 2026-06-18 第 2 ラウンド: cache step を JDK/Gradle setup より前へ昇格 +
      # Setup JDK / Setup Gradle を「cache miss 時のみ」 に条件付け。 直近 run 27742801618 で
      # cache hit 時にも setup-java (6s) + Post setup-gradle (13s) で 19s をムダにしてた
      # (gradle 自体起動しないのに setup の往復だけ走ってた)。 これで cache hit 時 ~55s → ~36s。
      - name: Cache Kotlin/Wasm distribution output
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            common/build/compileSync/wasmJs/main/productionExecutable/optimized
            common/build/dist/wasmJs/productionExecutable
          key: wasm-${{ runner.os }}-${{ hashFiles('common/src/**/*.kt', 'common/build.gradle.kts', 'build.gradle.kts', 'settings.gradle.kts', 'gradle/libs.versions.toml', 'gradle.properties') }}
          restore-keys: |
            wasm-${{ runner.os }}-

      - name: Setup JDK 21
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin/Wasm distribution
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: ./gradlew :common:wasmJsBrowserDistribution --no-daemon --build-cache

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web (base=/trianglelist/)
        working-directory: web
        env:
          VITE_BASE: /trianglelist/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
