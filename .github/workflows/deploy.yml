# GitHub Actions - GitHub Pages デプロイワークフロー
# web/ (Vite + Kotlin/Wasm) のビルドとデプロイ。
# 旧 trianglelist-web (Rust + Trunk) 版を置き換え (2026-06-11、web 段階2)。
#
# リリース手順 (user 操作):
#   GitHub → Actions → "Deploy web to GitHub Pages" → Run workflow → branch を選んで実行
#   (デプロイは意図的に手動起動のみ。push では公開されない)

name: Deploy web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制御: 進行中のデプロイをキャンセルして最新を優先
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin/Wasm distribution
        run: ./gradlew :common:wasmJsBrowserDistribution --no-daemon

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web (base=/trianglelist/)
        working-directory: web
        env:
          VITE_BASE: /trianglelist/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
